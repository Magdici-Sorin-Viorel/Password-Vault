<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Password Vault Pro - Securizat</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #121212;
            color: #e0e0e0;
            padding: 16px;
            min-height: 100vh;
            transition: background 0.3s, color 0.3s;
        }

        body.light-mode {
            background: #f5f5f5;
            color: #1e1e2a;
        }

        body.light-mode .container {
            background: #ffffff;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        body.light-mode .card {
            background: #f0f0f0;
        }

        body.light-mode input {
            background: #ffffff;
            color: #1e1e2a;
            border-color: #ccc;
        }

        .container {
            max-width: 600px;
            width: 100%;
            margin: 0 auto;
            background: #1e1e2f;
            border-radius: 32px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: all 0.2s;
        }

        h1 {
            font-size: 1.6rem;
            text-align: center;
            margin-bottom: 20px;
        }

        h2 {
            font-size: 1.3rem;
            margin: 20px 0 12px 0;
            border-left: 4px solid #7c3aed;
            padding-left: 12px;
        }

        .card {
            background: #2a2a36;
            border-radius: 20px;
            padding: 18px;
            margin-bottom: 20px;
        }

        .input-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 6px;
            color: #b9b9ce;
        }

        input, select, button {
            width: 100%;
            padding: 12px 16px;
            font-size: 0.95rem;
            border-radius: 12px;
            border: none;
            outline: none;
            transition: 0.2s;
        }

        input, select {
            background: #1e1e2a;
            color: white;
            border: 1px solid #3a3a4a;
        }

        input:focus {
            border-color: #7c3aed;
        }

        button {
            background: #7c3aed;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 8px;
        }

        button.secondary {
            background: #3a3a4e;
        }

        button.danger {
            background: #b91c1c;
        }

        button.warning {
            background: #b45309;
        }

        .list-item {
            background: #23232e;
            margin: 10px 0;
            padding: 12px;
            border-radius: 16px;
        }

        .site-info {
            font-weight: 500;
            margin-bottom: 8px;
        }

        .site-email {
            font-size: 0.75rem;
            color: #aaa;
            word-break: break-all;
        }

        .actions {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .actions button {
            flex: 1;
            padding: 8px;
            font-size: 0.8rem;
            margin: 0;
        }

        .warning-text {
            background: #facc1510;
            border-left: 4px solid #facc15;
            padding: 10px;
            border-radius: 12px;
            font-size: 0.8rem;
            margin: 10px 0;
        }

        .settings-group {
            margin-bottom: 20px;
            padding: 10px;
            border-bottom: 1px solid #3a3a4a;
        }

        .toggle-switch {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 10px 0;
        }

        .footer-note {
            font-size: 0.7rem;
            text-align: center;
            margin-top: 20px;
            color: #7e7e92;
        }

        @media (max-width: 480px) {
            .container {
                padding: 16px;
            }
            .actions button {
                font-size: 0.7rem;
            }
        }
    </style>
</head>
<body>
<div class="container" id="appRoot"></div>

<script>
    // ********************** CRYPTO **********************
    async function deriveKey(pin, salt) {
        const enc = new TextEncoder();
        const keyMaterial = await window.crypto.subtle.importKey(
            "raw", enc.encode(pin), "PBKDF2", false, ["deriveKey"]
        );
        return window.crypto.subtle.deriveKey(
            { name: "PBKDF2", salt: salt, iterations: 100000, hash: "SHA-256" },
            keyMaterial, { name: "AES-GCM", length: 256 }, false, ["encrypt", "decrypt"]
        );
    }

    async function encryptData(plaintext, pin, salt) {
        const iv = window.crypto.getRandomValues(new Uint8Array(12));
        const key = await deriveKey(pin, salt);
        const encoded = new TextEncoder().encode(plaintext);
        const encrypted = await window.crypto.subtle.encrypt({ name: "AES-GCM", iv: iv }, key, encoded);
        const combined = new Uint8Array(iv.byteLength + encrypted.byteLength);
        combined.set(iv);
        combined.set(new Uint8Array(encrypted), iv.byteLength);
        return btoa(String.fromCharCode(...combined));
    }

    async function decryptData(encryptedBase64, pin, salt) {
        const combined = Uint8Array.from(atob(encryptedBase64), c => c.charCodeAt(0));
        const iv = combined.slice(0, 12);
        const data = combined.slice(12);
        const key = await deriveKey(pin, salt);
        const decrypted = await window.crypto.subtle.decrypt({ name: "AES-GCM", iv: iv }, key, data);
        return new TextDecoder().decode(decrypted);
    }

    // ********************** STORAGE **********************
    const STORAGE = {
        SALT: "vault_salt",
        ENCRYPTED_DATA: "vault_encrypted",
        HAS_PIN: "vault_has_pin",
        SETTINGS: "vault_settings",
        FAILED_ATTEMPTS: "vault_failed_attempts",
        LOCKED_UNTIL: "vault_locked_until"
    };

    let vaultEntries = [];
    let currentPin = null;
    let isUnlocked = false;
    let settings = {
        darkMode: true,
        failedAttemptsToLock: 3,
        failedAttemptsToWipe: 5,
        biometricEnabled: false
    };

    function loadSettings() {
        const saved = localStorage.getItem(STORAGE.SETTINGS);
        if (saved) {
            try {
                settings = { ...settings, ...JSON.parse(saved) };
                applyTheme();
            } catch(e) {}
        }
    }

    function saveSettings() {
        localStorage.setItem(STORAGE.SETTINGS, JSON.stringify(settings));
        applyTheme();
    }

    function applyTheme() {
        if (settings.darkMode) {
            document.body.classList.remove('light-mode');
        } else {
            document.body.classList.add('light-mode');
        }
    }

    async function saveVault() {
        if (!currentPin) return;
        const plainJson = JSON.stringify({ entries: vaultEntries });
        let saltBase64 = localStorage.getItem(STORAGE.SALT);
        let salt;
        if (saltBase64) {
            salt = Uint8Array.from(atob(saltBase64), c => c.charCodeAt(0));
        } else {
            salt = window.crypto.getRandomValues(new Uint8Array(16));
            localStorage.setItem(STORAGE.SALT, btoa(String.fromCharCode(...salt)));
        }
        const encrypted = await encryptData(plainJson, currentPin, salt);
        localStorage.setItem(STORAGE.ENCRYPTED_DATA, encrypted);
    }

    async function loadAndDecrypt(pin) {
        const encrypted = localStorage.getItem(STORAGE.ENCRYPTED_DATA);
        const saltBase64 = localStorage.getItem(STORAGE.SALT);
        if (!encrypted || !saltBase64) throw new Error("No data");
        const salt = Uint8Array.from(atob(saltBase64), c => c.charCodeAt(0));
        const decrypted = await decryptData(encrypted, pin, salt);
        return JSON.parse(decrypted).entries || [];
    }

    async function createNewVault(pin) {
        const salt = window.crypto.getRandomValues(new Uint8Array(16));
        localStorage.setItem(STORAGE.SALT, btoa(String.fromCharCode(...salt)));
        const emptyVault = { entries: [] };
        const encrypted = await encryptData(JSON.stringify(emptyVault), pin, salt);
        localStorage.setItem(STORAGE.ENCRYPTED_DATA, encrypted);
        localStorage.setItem(STORAGE.HAS_PIN, "true");
        return [];
    }

    function hasPinSet() {
        return localStorage.getItem(STORAGE.HAS_PIN) === "true";
    }

    function recordFailedAttempt() {
        let attempts = parseInt(localStorage.getItem(STORAGE.FAILED_ATTEMPTS) || "0");
        attempts++;
        localStorage.setItem(STORAGE.FAILED_ATTEMPTS, attempts);
        
        if (settings.failedAttemptsToWipe && attempts >= settings.failedAttemptsToWipe) {
            localStorage.clear();
            alert("🔒 Toate datele au fost șterse definitiv pentru siguranță!");
            window.location.reload();
            return true;
        } else if (settings.failedAttemptsToLock && attempts >= settings.failedAttemptsToLock) {
            const lockUntil = Date.now() + (5 * 60 * 1000);
            localStorage.setItem(STORAGE.LOCKED_UNTIL, lockUntil);
            alert(`Prea multe încercări greșite! Aplicația este blocată 5 minute.`);
            return true;
        }
        return false;
    }

    function resetFailedAttempts() {
        localStorage.removeItem(STORAGE.FAILED_ATTEMPTS);
        localStorage.removeItem(STORAGE.LOCKED_UNTIL);
    }

    function isLocked() {
        const lockedUntil = localStorage.getItem(STORAGE.LOCKED_UNTIL);
        if (lockedUntil && parseInt(lockedUntil) > Date.now()) {
            return true;
        }
        localStorage.removeItem(STORAGE.LOCKED_UNTIL);
        return false;
    }

    // ********************** RENDER **********************
    const root = document.getElementById("appRoot");

    function render() {
        if (isLocked()) {
            renderLockedScreen();
            return;
        }
        
        // Verifică dacă există PIN setat
        if (!hasPinSet()) {
            renderSetupPin();
            return;
        }
        
        if (!isUnlocked) {
            renderLoginScreen();
        } else {
            renderVaultApp();
        }
    }

    function renderLockedScreen() {
        root.innerHTML = `
            <div class="card" style="text-align:center;">
                <h2>🔒 Aplicație blocată</h2>
                <p>Prea multe încercări greșite. Revino peste 5 minute.</p>
                <button onclick="window.location.reload()">Reîncarcă</button>
            </div>
        `;
    }

    function renderSetupPin() {
        root.innerHTML = `
            <div class="card">
                <h2>🔐 Bun venit! Setează-ți seiful de parole</h2>
                <p>Alege un PIN de <strong>exact 8 cifre</strong> pentru a-ți proteja parolele.</p>
                <div class="input-group">
                    <label>PIN (8 cifre)</label>
                    <input type="password" id="newPin" inputmode="numeric" maxlength="8" placeholder="ex: 12345678">
                </div>
                <div class="input-group">
                    <label>Confirmă PIN</label>
                    <input type="password" id="confirmPin" inputmode="numeric" maxlength="8">
                </div>
                <button id="setupPinBtn">✅ Activează seiful</button>
            </div>
        `;
        
        document.getElementById("setupPinBtn")?.addEventListener("click", async () => {
            const newPin = document.getElementById("newPin").value.trim();
            const confirmPin = document.getElementById("confirmPin").value.trim();
            
            if (!/^\d{8}$/.test(newPin)) {
                alert("PIN-ul trebuie să aibă EXACT 8 cifre (doar numere).");
                return;
            }
            if (newPin !== confirmPin) {
                alert("PIN-urile nu coincid.");
                return;
            }
            
            await createNewVault(newPin);
            currentPin = newPin;
            vaultEntries = [];
            isUnlocked = true;
            resetFailedAttempts();
            render();
        });
    }

    function renderLoginScreen() {
        root.innerHTML = `
            <div class="card">
                <h2>🔒 Seif Parole</h2>
                <p>Introdu PIN-ul (8 cifre) pentru a-ți accesa parolele</p>
                <div class="input-group">
                    <label>PIN</label>
                    <input type="password" id="loginPin" inputmode="numeric" maxlength="8" placeholder="••••••••">
                </div>
                <button id="unlockBtn">🔓 Deblochează</button>
            </div>
        `;
        
        document.getElementById("unlockBtn")?.addEventListener("click", async () => {
            const entered = document.getElementById("loginPin").value.trim();
            
            if (!/^\d{8}$/.test(entered)) {
                alert("PIN invalid (trebuie exact 8 cifre)");
                const shouldWipe = recordFailedAttempt();
                if (!shouldWipe) render();
                return;
            }
            
            try {
                const entries = await loadAndDecrypt(entered);
                vaultEntries = entries;
                currentPin = entered;
                isUnlocked = true;
                resetFailedAttempts();
                render();
            } catch (err) {
                alert("PIN greșit!");
                const shouldWipe = recordFailedAttempt();
                if (!shouldWipe) render();
            }
        });
    }

    function renderVaultApp() {
        root.innerHTML = `
            <div>
                <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;">
                    <h1>🔐 Password Vault</h1>
                    <div style="display: flex; gap: 8px;">
                        <button id="settingsBtn" class="secondary" style="width: auto; padding: 8px 16px;">⚙️ Setări</button>
                        <button id="lockBtn" class="secondary" style="width: auto; padding: 8px 16px;">🚪 Blochează</button>
                    </div>
                </div>
                
                <div class="card">
                    <h2>➕ Adăugare / Editare</h2>
                    <div class="input-group">
                        <label>Nume cont / Platformă (ex: Facebook, Trading212)</label>
                        <input type="text" id="siteInput" placeholder="ex: Instagram">
                    </div>
                    <div class="input-group">
                        <label>Email / Adresă cont</label>
                        <input type="email" id="emailInput" placeholder="email@example.com">
                    </div>
                    <div class="input-group">
                        <label>Parolă</label>
                        <input type="text" id="passwordInput" placeholder="parola">
                        <button id="generatePwdBtn" class="secondary" style="margin-top: 5px;">🎲 Generează parolă puternică</button>
                    </div>
                    <input type="hidden" id="editId" value="">
                    <button id="saveBtn">💾 Salvează / Actualizează</button>
                    <button id="cancelEditBtn" class="secondary">Anulează editare</button>
                    <div id="duplicateWarning" class="warning-text" style="display:none;"></div>
                </div>
                
                <h2>📋 Conturile mele (${vaultEntries.length})</h2>
                <div id="entriesList"></div>
                
                <div class="card">
                    <button id="exportBackupBtn" class="secondary">📤 Exportă backup criptat</button>
                    <div class="input-group">
                        <label>Importă backup criptat</label>
                        <input type="file" id="importFile" accept=".vault">
                        <button id="importBtn" class="secondary">📥 Importă</button>
                    </div>
                </div>
                <div class="footer-note">🔒 Toate datele sunt criptate local. Backup-urile sunt protejate cu același PIN.</div>
            </div>
        `;

        const entriesContainer = document.getElementById("entriesList");
        
        function refreshEntriesList() {
            if (!entriesContainer) return;
            if (vaultEntries.length === 0) {
                entriesContainer.innerHTML = `<div class="card">Nu există parole salvate. Adaugă una mai sus.</div>`;
                return;
            }
            entriesContainer.innerHTML = "";
            vaultEntries.forEach(entry => {
                const div = document.createElement("div");
                div.className = "list-item";
                div.innerHTML = `
                    <div class="site-info">
                        <strong>${escapeHtml(entry.site)}</strong>
                        <div class="site-email">📧 ${escapeHtml(entry.email)}</div>
                    </div>
                    <div class="actions">
                        <button data-id="${entry.id}" class="viewBtn">🔍 Vezi parola</button>
                        <button data-id="${entry.id}" class="editBtn">✏️ Editează</button>
                        <button data-id="${entry.id}" class="deleteBtn danger">🗑️ Șterge</button>
                    </div>
                `;
                entriesContainer.appendChild(div);
            });

            document.querySelectorAll(".viewBtn").forEach(btn => {
                btn.addEventListener("click", () => {
                    const entry = vaultEntries.find(e => e.id === btn.getAttribute("data-id"));
                    if (entry) alert(`🔑 Parolă pentru ${entry.site}:\n\n${entry.password}`);
                });
            });
            
            document.querySelectorAll(".editBtn").forEach(btn => {
                btn.addEventListener("click", () => {
                    const entry = vaultEntries.find(e => e.id === btn.getAttribute("data-id"));
                    if (entry) {
                        document.getElementById("siteInput").value = entry.site;
                        document.getElementById("emailInput").value = entry.email;
                        document.getElementById("passwordInput").value = entry.password;
                        document.getElementById("editId").value = entry.id;
                        document.getElementById("duplicateWarning").style.display = "none";
                    }
                });
            });
            
            document.querySelectorAll(".deleteBtn").forEach(btn => {
                btn.addEventListener("click", async () => {
                    if (confirm("Șterge această parolă?")) {
                        vaultEntries = vaultEntries.filter(e => e.id !== btn.getAttribute("data-id"));
                        await saveVault();
                        refreshEntriesList();
                    }
                });
            });
        }

        document.getElementById("saveBtn")?.addEventListener("click", async () => {
            const site = document.getElementById("siteInput").value.trim();
            const email = document.getElementById("emailInput").value.trim();
            const password = document.getElementById("passwordInput").value.trim();
            const editId = document.getElementById("editId").value;

            if (!site || !email || !password) {
                alert("Completează toate câmpurile.");
                return;
            }

            // Verificare duplicat: același site ȘI același email
            const existing = vaultEntries.find(e => e.site === site && e.email === email && e.id !== editId);
            const warningDiv = document.getElementById("duplicateWarning");
            if (existing) {
                warningDiv.style.display = "block";
                warningDiv.innerHTML = `⚠️ Există deja o parolă pentru "${site}" cu email-ul ${email}. Folosește butonul Editează pentru a modifica parola existentă.`;
                return;
            } else {
                warningDiv.style.display = "none";
            }

            if (editId) {
                const index = vaultEntries.findIndex(e => e.id === editId);
                if (index !== -1) vaultEntries[index] = { ...vaultEntries[index], site, email, password };
                document.getElementById("editId").value = "";
            } else {
                const newId = crypto.randomUUID();
                vaultEntries.push({ id: newId, site, email, password });
            }

            document.getElementById("siteInput").value = "";
            document.getElementById("emailInput").value = "";
            document.getElementById("passwordInput").value = "";
            await saveVault();
            refreshEntriesList();
        });

        document.getElementById("generatePwdBtn")?.addEventListener("click", () => {
            const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*()_+";
            let pwd = "";
            for (let i = 0; i < 16; i++) pwd += chars.charAt(Math.floor(Math.random() * chars.length));
            document.getElementById("passwordInput").value = pwd;
        });

        document.getElementById("cancelEditBtn")?.addEventListener("click", () => {
            document.getElementById("siteInput").value = "";
            document.getElementById("emailInput").value = "";
            document.getElementById("passwordInput").value = "";
            document.getElementById("editId").value = "";
            document.getElementById("duplicateWarning").style.display = "none";
        });

        document.getElementById("lockBtn")?.addEventListener("click", () => {
            isUnlocked = false;
            currentPin = null;
            render();
        });

        document.getElementById("settingsBtn")?.addEventListener("click", () => {
            showSettingsDialog();
        });

        document.getElementById("exportBackupBtn")?.addEventListener("click", async () => {
            const backupData = {
                version: 1,
                entries: vaultEntries,
                timestamp: Date.now()
            };
            const plainJson = JSON.stringify(backupData);
            let saltBase64 = localStorage.getItem(STORAGE.SALT);
            let salt = saltBase64 ? Uint8Array.from(atob(saltBase64), c => c.charCodeAt(0)) : new Uint8Array(16);
            const encrypted = await encryptData(plainJson, currentPin, salt);
            const blob = new Blob([encrypted], {type: "application/json"});
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `vault_backup_${new Date().toISOString().slice(0,19)}.vault`;
            link.click();
            alert("Backup exportat cu succes!");
        });

        document.getElementById("importBtn")?.addEventListener("click", async () => {
            const fileInput = document.getElementById("importFile");
            if (!fileInput.files.length) {
                alert("Selectează un fișier backup.");
                return;
            }
            const file = fileInput.files[0];
            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const encryptedBase64 = e.target.result;
                    const saltBase64 = localStorage.getItem(STORAGE.SALT);
                    const salt = Uint8Array.from(atob(saltBase64), c => c.charCodeAt(0));
                    const decrypted = await decryptData(encryptedBase64, currentPin, salt);
                    const backup = JSON.parse(decrypted);
                    if (backup.entries && Array.isArray(backup.entries)) {
                        vaultEntries = backup.entries;
                        await saveVault();
                        refreshEntriesList();
                        alert("Import reușit!");
                    } else throw new Error();
                } catch(err) {
                    alert("Fișier invalid sau PIN incorect!");
                }
            };
            reader.readAsText(file);
        });

        refreshEntriesList();
    }

    function showSettingsDialog() {
        const modalHtml = `
            <div id="settingsModal" style="position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.8); display:flex; align-items:center; justify-content:center; z-index:1000;">
                <div style="background:#1e1e2f; max-width:500px; width:90%; border-radius:24px; padding:20px; max-height:80vh; overflow-y:auto;">
                    <h2>⚙️ Setări securitate</h2>
                    
                    <div class="settings-group">
                        <div class="toggle-switch">
                            <label>🌙 Mod întunecat</label>
                            <input type="checkbox" id="darkModeToggle" ${settings.darkMode ? 'checked' : ''}>
                        </div>
                    </div>
                    
                    <div class="settings-group">
                        <label>🔐 Blochează după X încercări greșite</label>
                        <input type="number" id="lockAttempts" value="${settings.failedAttemptsToLock}" min="1" max="10">
                        <small>0 = dezactivează blocarea</small>
                    </div>
                    
                    <div class="settings-group">
                        <label>💣 Șterge tot după Y încercări greșite</label>
                        <input type="number" id="wipeAttempts" value="${settings.failedAttemptsToWipe}" min="2" max="10">
                        <small>Trebuie să fie mai mare decât blocarea</small>
                    </div>
                    
                    <div style="display:flex; gap:10px; margin-top:20px;">
                        <button id="saveSettingsBtn">💾 Salvează setări</button>
                        <button id="closeSettingsBtn" class="secondary">Închide</button>
                    </div>
                </div>
            </div>
        `;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
        
        document.getElementById("saveSettingsBtn")?.addEventListener("click", () => {
            settings.darkMode = document.getElementById("darkModeToggle").checked;
            settings.failedAttemptsToLock = parseInt(document.getElementById("lockAttempts").value) || 3;
            settings.failedAttemptsToWipe = parseInt(document.getElementById("wipeAttempts").value) || 5;
            if (settings.failedAttemptsToWipe <= settings.failedAttemptsToLock) {
                alert("Atenție: Numărul pentru ștergere trebuie să fie mai mare decât cel pentru blocare!");
                settings.failedAttemptsToWipe = settings.failedAttemptsToLock + 1;
            }
            saveSettings();
            document.getElementById("settingsModal")?.remove();
            alert("Setări salvate!");
        });
        
        document.getElementById("closeSettingsBtn")?.addEventListener("click", () => {
            document.getElementById("settingsModal")?.remove();
        });
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // Inițializare
    loadSettings();
    render();
</script>
</body>
</html>
